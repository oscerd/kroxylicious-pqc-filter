# =============================================================================
# Docker Compose: Kafka + Kroxylicious PQC Filter Demo
# =============================================================================
#
# Architecture:
#
#   Producer (localhost:9192)
#       |
#       v
#   Kroxylicious Proxy (:9192)          <-- PQC filter encrypts on Produce
#       |
#       v
#   Kafka Broker (:9092)                 <-- Stores encrypted records
#       |
#       v
#   Kroxylicious Proxy (:9192)          <-- PQC filter decrypts on Fetch
#       |
#       v
#   Consumer (localhost:9192)
#
# Usage:
#   docker compose up -d
#
#   # Produce via proxy (plaintext -> encrypted):
#   mvn compile exec:java \
#     -Dexec.mainClass=io.kroxylicious.filter.pqc.examples.PqcProducerExample
#
#   # Consume via proxy (encrypted -> plaintext):
#   mvn compile exec:java \
#     -Dexec.mainClass=io.kroxylicious.filter.pqc.examples.PqcConsumerExample \
#     -Dexec.args="localhost:9192"
#
#   # Consume directly from broker (see encrypted data):
#   mvn compile exec:java \
#     -Dexec.mainClass=io.kroxylicious.filter.pqc.examples.PqcConsumerExample \
#     -Dexec.args="localhost:9092"
#
#   docker compose down
# =============================================================================

services:
  # ── Kafka Broker (KRaft mode, no Zookeeper) ──────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: pqc-demo-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://kafka:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "pqc-demo-cluster-001"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kroxylicious Proxy with PQC Filter ───────────────────────────────
  kroxylicious:
    image: quay.io/kroxylicious/kroxylicious:0.19.0
    container_name: pqc-demo-proxy
    ports:
      - "9192:9192"
      - "9193:9193"
    environment:
      KROXYLICIOUS_CLASSPATH: /opt/kroxylicious/plugins/*
    volumes:
      - ./config/proxy-config.yaml:/opt/kroxylicious/config/proxy-config.yaml:ro
      - ./config/pqc-keys:/opt/kroxylicious/pqc-keys:ro
      - ../../target/kroxylicious-pqc-filter-1.0.0-SNAPSHOT.jar:/opt/kroxylicious/plugins/kroxylicious-pqc-filter.jar:ro
    command: ["--config", "/opt/kroxylicious/config/proxy-config.yaml"]
    depends_on:
      kafka:
        condition: service_healthy
